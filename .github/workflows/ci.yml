name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - web
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ./src  # Set PYTHONPATH to include the src directory

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so tags are fetched correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Use Python 3.11 for TensorFlow compatibility

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install NumPy first with constraint to prevent NumPy 2.x from being installed
          # TensorFlow requires NumPy < 2.0
          pip install "numpy>=1.19.2,<2.0"
          # Install base requirements (which also has numpy constraint, but already installed)
          pip install -r requirements.txt -c constraints.txt
          pip install -r requirements-tensorflow.txt -c constraints.txt
          pip install -r requirements-explainability.txt -c constraints.txt
          pip install -r requirements-pytorch.txt -c constraints.txt
          # Install test dependencies with constraints to prevent NumPy upgrade
          pip install -c constraints.txt pytest==8.1.1 pytest-cov>=5.0.0 coverage>=7.4.0 flake8 pandoc "pandas>=2.0.0" httpx pytest-mock pytest-asyncio
          pip install -c constraints.txt pytest-xdist pytest-parallel pytest-timeout
          pip install -c constraints.txt setuptools wheel twine sphinx coveralls responses
          pip install -c constraints.txt dash dash[testing]
          pip install -c constraints.txt selenium webdriver-manager
          # Verify NumPy version is still < 2.0
          python -c "import numpy; assert numpy.__version__.startswith('1.'), f'NumPy version {numpy.__version__} is >= 2.0, but TensorFlow requires < 2.0'"
      
      - name: Verify NumPy and TensorFlow Installation
        run: |
          echo "Python version:"
          python --version
          echo "NumPy version:"
          python -c "import numpy; print(f'NumPy {numpy.__version__}')"
          python -c "import numpy; assert numpy.__version__.startswith('1.'), f'ERROR: NumPy version {numpy.__version__} is >= 2.0, but TensorFlow requires < 2.0'"
          echo "TensorFlow version:"
          python -c "import tensorflow as tf; print(f'TensorFlow {tf.__version__} installed successfully')"
          echo "Available packages:"
          pip list | grep -i -E "(numpy|tensorflow)"
      
      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          sudo apt-get install -y xvfb

      - name: Run Tests and Generate Coverage with Xvfb (for headless browser)
        run: |
          Xvfb :99 &  # Start X virtual framebuffer for headless browser testing
          sleep 2      # Wait for Xvfb to be ready
          export DISPLAY=:99  # Set the DISPLAY environment variable to use Xvfb
          # Set environment variables for headless plotting
          export MPLBACKEND=Agg
          export QT_QPA_PLATFORM=offscreen
          # Run all tests (coverage options defined in pytest-full.ini, config from .coveragerc)
          # pytest-cov generates html, terminal, and xml reports directly (no separate coverage command needed)
          pytest -c pytest-full.ini --cov-config=.coveragerc


      - name: Run Linting
        # Note: F401 (unused imports) is ignored in .flake8 config
        run: make lint

      - name: Generate Documentation
        run: make pandoc

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cov_html

      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/
      
      - name: Start Uvicorn (background)
        run: nohup uvicorn src.webapp.run_webapp:fastapi_app --host 0.0.0.0 --port 8000 &

      # - name: Run Web App Tests
      #   run: pytest tests/  # Assuming having tests to run that require the app

      - name: Build package
        run: make build
      
      - name: Send coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.xml
          format: cobertura
      # - name: Deploy to PyPI
      #   if: github.ref == 'refs/heads/main'
      #   run: make upload
      #   env:
      #     TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
      #     TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}